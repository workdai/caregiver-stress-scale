<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>家照據點活動公告</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --surface: #ffffff;
      --surface-2: #f1f3f9;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --primary: #3157d5;
      --primary-2: #e8eeff;
      --accent: #d84f6a;
      --shadow: 0 10px 30px rgba(17, 24, 39, 0.08);
      --radius: 18px;
      --max: 1180px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    a { color: inherit; text-decoration: none; }
    button { font: inherit; border: 0; cursor: pointer; }
    .container { width: min(calc(100% - 32px), var(--max)); margin: 0 auto; }
    .topbar {
      position: sticky; top: 0; z-index: 20; backdrop-filter: blur(14px);
      background: rgba(246, 247, 251, 0.88); border-bottom: 1px solid rgba(229, 231, 235, 0.8);
    }
    .topbar-inner {
      display: flex; align-items: center; justify-content: space-between; gap: 12px; min-height: 72px;
    }
    .brand { display: flex; align-items: center; gap: 12px; font-weight: 800; letter-spacing: 0.02em; }
    .brand-badge {
      width: 40px; height: 40px; border-radius: 14px; display: grid; place-items: center;
      background: linear-gradient(135deg, var(--primary), #6f8cff); color: #fff; box-shadow: var(--shadow);
    }
    .nav { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .nav a {
      padding: 10px 14px; border-radius: 999px; color: var(--muted); background: transparent; transition: 0.2s ease;
    }
    .nav a:hover, .nav a.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }
    .hero { padding: 40px 0 18px; }
    .hero-card {
      background: linear-gradient(135deg, #eff4ff 0%, #ffffff 60%, #fff1f4 100%);
      border: 1px solid #ebeff8; border-radius: 28px; box-shadow: var(--shadow); padding: 28px;
      display: grid; grid-template-columns: 1.3fr 0.9fr; gap: 20px;
    }
    h1, h2, h3, p { margin: 0; }
    h1 { font-size: clamp(30px, 4vw, 44px); line-height: 1.15; margin-bottom: 12px; }
    .hero p { color: var(--muted); font-size: 16px; max-width: 680px; }
    .hero-link {
      display: inline-flex; align-items: center; gap: 8px; margin-top: 12px; color: var(--primary);
      font-weight: 700; word-break: break-word; text-decoration: underline;
    }
    .hero-actions { margin-top: 22px; display: flex; gap: 12px; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 12px 18px; border-radius: 14px; transition: 0.2s ease; font-weight: 700;
    }
    .btn-primary { background: var(--primary); color: #fff; box-shadow: var(--shadow); }
    .btn-primary:hover { transform: translateY(-1px); }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--line); }
    .hero-side { display: grid; gap: 12px; align-content: start; }
    .stat-card {
      background: rgba(255,255,255,0.75); border: 1px solid var(--line); border-radius: 20px; padding: 18px;
    }
    .stat-label { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
    .stat-value { font-size: 28px; font-weight: 800; line-height: 1.2; }
    .section { padding: 24px 0 10px; }
    .section-head { display: flex; justify-content: space-between; align-items: end; gap: 16px; margin-bottom: 18px; }
    .section-title { font-size: 28px; line-height: 1.2; }
    .section-subtitle { color: var(--muted); font-size: 14px; margin-top: 6px; }
    .toolbar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin: 10px 0 18px; }
    .search, .select {
      min-height: 46px; border: 1px solid var(--line); background: var(--surface); border-radius: 14px;
      padding: 0 14px; color: var(--text); font: inherit;
    }
    .search { width: min(420px, 100%); }
    .grid { display: grid; gap: 16px; }
    .city-grid { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    .event-grid, .center-grid { grid-template-columns: repeat(auto-fit, minmax(320px, 320px)); justify-content: start; }
    .card {
      background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
      overflow: hidden; box-shadow: var(--shadow); transition: 0.2s ease;
    }
    .card:hover { transform: translateY(-2px); }
    .city-card { display: flex; flex-direction: column; gap: 12px; padding: 20px; }
    .city-card-top { display: flex; justify-content: space-between; align-items: start; gap: 10px; }
    .city-name { font-size: 22px; font-weight: 800; line-height: 1.2; }
    .chip {
      display: inline-flex; align-items: center; justify-content: center; min-height: 30px; padding: 4px 10px;
      border-radius: 999px; background: var(--surface-2); color: var(--muted); font-size: 13px; font-weight: 700;
      white-space: nowrap;
    }
    .chip.primary { background: var(--primary-2); color: var(--primary); }
    .chip.accent { background: #ffe8ee; color: var(--accent); }
    .city-card p { color: var(--muted); font-size: 14px; min-height: 44px; }
    .city-card .btn-secondary { width: fit-content; }
    .event-image {
      background: linear-gradient(135deg, #dde6ff, #fff1f4);
      overflow: hidden; position: relative;
    }
    .event-image img { width: 100%; height: auto; display: block; }
    .event-image-fallback {
      width: 100%; height: 100%; display: grid; place-items: center; color: var(--primary);
      font-size: 40px; font-weight: 800; letter-spacing: 0.1em;
    }
    .event-body, .center-body { padding: 18px; display: grid; gap: 12px; }
    .meta { display: flex; gap: 8px; flex-wrap: wrap; }
    .event-title, .center-title { font-size: 20px; font-weight: 800; line-height: 1.35; }
    .detail-list { display: grid; gap: 8px; }
    .detail-item { display: grid; grid-template-columns: 74px 1fr; gap: 8px; align-items: start; font-size: 14px; }
    .detail-item .label { color: var(--muted); font-weight: 700; }
    .detail-item .value { word-break: break-word; white-space: pre-wrap; }
    .detail-item .value a, .body-text a { color: var(--primary); font-weight: 700; text-decoration: underline; }
    .card-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px; border-radius: 999px; font-size: 13px; font-weight: 700;
      color: var(--muted); background: var(--surface); border: 1px solid var(--line);
      cursor: pointer; transition: 0.2s ease; margin-bottom: 16px;
    }
    .back-btn:hover { color: var(--text); border-color: #b0b8cc; background: var(--surface-2); }
    .empty, .loading, .error-box {
      background: var(--surface); border: 1px dashed #cfd5e4; border-radius: 20px; padding: 28px;
      color: var(--muted); text-align: center; box-shadow: var(--shadow);
    }
    .page-title { font-size: clamp(28px, 4vw, 38px); line-height: 1.2; margin-bottom: 10px; }
    .page-desc { color: var(--muted); }
    .detail-layout { display: grid; gap: 22px; grid-template-columns: minmax(0, 1.15fr) minmax(320px, 0.85fr); align-items: start; }
    .detail-main, .detail-side, .panel {
      background: var(--surface); border: 1px solid var(--line); border-radius: 24px; box-shadow: var(--shadow); overflow: hidden;
    }
    .detail-content, .panel-body { padding: 22px; }
    .detail-cover { background: linear-gradient(135deg, #dde6ff, #fff1f4); }
    .detail-cover img { width: 100%; height: auto; display: block; }
    .detail-heading { margin-bottom: 18px; }
    .detail-heading h2 { font-size: clamp(26px, 3vw, 34px); line-height: 1.25; margin: 8px 0 0; }
    .body-text { white-space: pre-wrap; word-break: break-word; color: #374151; }
    .breadcrumbs {
      display: flex; gap: 8px; align-items: center; color: var(--muted);
      font-size: 14px; flex-wrap: wrap; margin-bottom: 16px;
    }
    .footer { padding: 40px 0 56px; color: var(--muted); font-size: 14px; }

    @media (max-width: 920px) {
      .hero-card, .detail-layout { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      .hero { padding: 24px 0 12px; }
      .hero-card { padding: 20px; border-radius: 24px; }
      .hero-card h1 { font-size: 26px; line-height: 1.3; }
      .hero-actions, .card-actions, .section-head { flex-direction: column; align-items: stretch; }
      .hero-actions .btn, .card-actions .btn, .section-head .btn { width: 100%; }
      .city-grid, .event-grid, .center-grid { grid-template-columns: 1fr; }
      .nav { flex-wrap: wrap; gap: 8px; }
      .stat-card { padding: 16px; }
      .event-body, .center-body, .detail-content, .panel-body { padding: 16px; }
    }
    @media (max-width: 640px) {
      .topbar-inner { min-height: auto; padding: 12px 0; align-items: start; flex-direction: column; }
      .section-title, .page-title { font-size: 26px; }
      .detail-item { grid-template-columns: 1fr; gap: 2px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="#/">
        <div class="brand-badge">照</div>
        <div>家照據點活動公告</div>
      </a>
      <nav class="nav">
        <a href="#/" data-nav="home">首頁</a>
        <a href="#/centers" data-nav="centers">全台家照據點</a>
      </nav>
    </div>
  </header>

  <main id="app">
    <div class="container section">
      <div class="loading">載入中…</div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      本網站資料由 Google Sheet 與 Google Apps Script API 提供，前台可部署於 GitHub Pages。
    </div>
  </footer>

  <script>
    const ACTIVITY_API = 'https://script.google.com/macros/s/AKfycbyPuDTU4NJN7FJDiEIhV1NbAs5rYsPmNmddCN6hMOuoLCAoVM3qdB1N8BjDHth49MBu/exec';
    const CENTER_API = 'https://script.google.com/macros/s/AKfycbxXKNnCUUIuzZDf6mM-PSvIcXgqmcROEEcW6DkWjQ2c3OQ5CAMdu8WhsZjqU0M0GviFPA/exec';
    const CONFIG_API = 'https://script.google.com/macros/s/AKfycbzA0Bq9qkDNzQuHnXwBIVSmRiGi3Y1VhnvR5ObA5aPDlLMz64YhytygDA8kYwRM285hkQ/exec?action=config';

    const CITY_ORDER = ['基隆市','臺北市','新北市','桃園市','新竹市','新竹縣','苗栗縣','臺中市','彰化縣','南投縣','雲林縣','嘉義市','嘉義縣','臺南市','高雄市','屏東縣','宜蘭縣','花蓮縣','臺東縣','澎湖縣','金門縣','連江縣'];

    const state = { activities: null, centers: null, config: null, error: null };
    const app = document.getElementById('app');

    function setActiveNav(route) {
      document.querySelectorAll('[data-nav]').forEach(link => {
        link.classList.toggle('active', link.dataset.nav === route);
      });
    }

    async function fetchJson(url) {
      const response = await fetch(url);
      if (!response.ok) throw new Error('資料讀取失敗');
      return response.json();
    }

    function getTodayTaipei() {
      return new Intl.DateTimeFormat('en-CA', {
        timeZone: 'Asia/Taipei', year: 'numeric', month: '2-digit', day: '2-digit'
      }).format(new Date());
    }

    function isUpcomingActivity(item) {
      if (!item || !item.sortDate) return true;
      return item.sortDate >= getTodayTaipei();
    }

    async function ensureData() {
      if (state.activities && state.centers && state.config) return;
      try {
        const [activities, centers, config] = await Promise.all([
          fetchJson(ACTIVITY_API),
          fetchJson(CENTER_API),
          fetchJson(CONFIG_API)
        ]);

        state.activities = Array.isArray(activities)
          ? activities.map(a => ({ ...a, city: normalizeCity(a.city) })).filter(isUpcomingActivity).slice().sort(sortActivities)
          : [];
        state.centers = Array.isArray(centers)
          ? centers.map(c => ({ ...c, city: normalizeCity(c.city) })).slice().sort(sortCenters)
          : [];
        state.config = config || {};
        state.error = null;
      } catch (error) {
        console.error(error);
        state.error = '目前無法讀取資料，請稍後再試。';
      }
    }

    function sortActivities(a, b) {
      const dateA = a.sortDate || '9999-99-99';
      const dateB = b.sortDate || '9999-99-99';
      if (dateA !== dateB) return dateA.localeCompare(dateB);
      return (a.time || '').localeCompare(b.time || '');
    }

    function sortCenters(a, b) {
      const cityDiff = cityIndex(a.city) - cityIndex(b.city);
      if (cityDiff !== 0) return cityDiff;
      return (a.centerName || '').localeCompare(b.centerName || '', 'zh-Hant');
    }

    function cityIndex(city) {
      const index = CITY_ORDER.indexOf(normalizeCity(city));
      return index === -1 ? 999 : index;
    }

    function normalizeCity(city) {
      return String(city || '').replace(/台/g, '臺');
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function linkifyText(text) {
      const source = String(text || '');
      const escaped = escapeHtml(source);
      const withUrls = escaped.replace(/(https?:\/\/[^\s<]+)/g, function(url) {
        return '<a href="' + url + '" target="_blank" rel="noopener noreferrer">' + url + '</a>';
      });
      return withUrls.replace(/(\+?\d[\d\-\s#（）()]{6,}\d)/g, function(match) {
        const cleaned = match.replace(/[^\d+]/g, '');
        if (!cleaned) return match;
        return '<a href="tel:' + cleaned + '">' + match + '</a>';
      });
    }

    function buildPhoneHref(phone) {
      const first = String(phone || '').split('/')[0].trim();
      const digits = first.replace(/[^\d+]/g, '');
      return digits ? `tel:${digits}` : '';
    }

    function normalizeDriveImage(url) {
      if (!url) return '';
      url = String(url).trim();

      if (url.includes('drive.google.com')) {
        let id = '';
        const openMatch = url.match(/open\?id=([^&]+)/);
        const fileMatch = url.match(/\/d\/([^/]+)/);
        const exportMatch = url.match(/[?&]id=([^&]+)/);

        if (openMatch) id = openMatch[1];
        if (fileMatch) id = fileMatch[1];
        if (!id && exportMatch) id = exportMatch[1];

        if (id) return 'https://drive.google.com/thumbnail?id=' + id + '&sz=w1200';
      }
      return url;
    }

    function getHashInfo() {
      const raw = location.hash || '#/';
      const [pathPart, queryPart = ''] = raw.split('?');
      const path = pathPart.replace(/^#/, '') || '/';
      const params = new URLSearchParams(queryPart);
      return { path, params };
    }

    function buildCityCard(city, count, centerCount) {
      return `
        <article class="card city-card" style="text-align:center;">
          <div class="city-name" style="font-size:20px; font-weight:800; margin-bottom:12px;">${escapeHtml(city)}</div>
          <a class="btn ${count > 0 ? 'btn-primary' : 'btn-secondary'}" style="width:100%; justify-content:center; font-size:13px; padding:9px 10px; margin-bottom:8px; white-space:nowrap;" href="#/city?name=${encodeURIComponent(city)}">查看活動 ${count} 場</a>
          <a class="btn btn-secondary" style="width:100%; justify-content:center; font-size:13px; padding:9px 10px; white-space:nowrap;" href="#/centers?city=${encodeURIComponent(city)}">家照據點 ${centerCount} 處</a>
        </article>
      `;
    }

    function eventImageMarkup(item) {
      const url = normalizeDriveImage(item.image);
      if (url) return `<img src="${escapeHtml(url)}" alt="${escapeHtml(item.title)}" loading="lazy" referrerpolicy="no-referrer">`;
      const text = (item.city || '照').slice(0, 1);
      return `<div class="event-image-fallback">${escapeHtml(text)}</div>`;
    }

    function buildEventCard(item) {
      return `
        <article class="card">
          <a href="#/activity?id=${encodeURIComponent(item.id)}">
            <div class="event-image">${eventImageMarkup(item)}</div>
          </a>
          <div class="event-body">
            <div class="meta">
              <span class="chip primary">${escapeHtml(item.city || '未分類')}</span>
              <span class="chip">${escapeHtml(item.centerName || '據點')}</span>
            </div>
            <a href="#/activity?id=${encodeURIComponent(item.id)}">
              <div class="event-title">${escapeHtml(item.title || '未命名活動')}</div>
            </a>
            <div class="detail-list">
              <div class="detail-item"><div class="label">日期</div><div class="value">${escapeHtml(item.date || '-')}</div></div>
              <div class="detail-item"><div class="label">時間</div><div class="value">${escapeHtml(item.time || '-')}</div></div>
              <div class="detail-item"><div class="label">地點</div><div class="value">${escapeHtml(item.location || '-')}</div></div>
            </div>
            <div class="card-actions">
              <a class="btn btn-secondary" href="#/activity?id=${encodeURIComponent(item.id)}">查看詳情</a>
            </div>
          </div>
        </article>
      `;
    }

    function buildCenterCard(item) {
      const typeClass = item.type === '創新' ? 'accent' : 'primary';
      const phoneHref = buildPhoneHref(item.phone);
      return `
        <article class="card center-body">
          <div class="meta">
            <span class="chip primary">${escapeHtml(item.city || '未分類')}</span>
            <span class="chip ${typeClass}">${escapeHtml(item.type || '據點')}</span>
          </div>
          <div class="center-title">${escapeHtml(item.centerName || '未命名據點')}</div>
          <div class="detail-list">
            <div class="detail-item"><div class="label">地址</div><div class="value">${escapeHtml(item.address || '-')}</div></div>
            <div class="detail-item"><div class="label">電話</div><div class="value">${phoneHref ? `<a href="${escapeHtml(phoneHref)}">${escapeHtml(item.phone || '-')}</a>` : escapeHtml(item.phone || '-')}</div></div>
            <div class="detail-item"><div class="label">服務區域</div><div class="value">${escapeHtml(item.serviceArea || '-')}</div></div>
          </div>
        </article>
      `;
    }

    function renderHome() {
      setActiveNav('home');
      const activities = state.activities || [];
      const centers = state.centers || [];
      const config = state.config || {};
      const heroTitle = config.hero_title?.text || '找到離你最近的照顧活動與家照據點';
      const heroText = config.hero_text?.text || '本頁整合各地據點已公開活動，提供縣市分類、活動詳情與全台家照據點資料。';
      const heroLinkText = config.hero_text?.link_text || '';
      const heroLinkUrl = config.hero_text?.link_url || '';

      const map = new Map();
      activities.forEach(item => {
        const city = item.city || '未分類';
        map.set(city, (map.get(city) || 0) + 1);
      });

      const centerMap = new Map();
      centers.forEach(item => {
        const city = item.city || '未分類';
        centerMap.set(city, (centerMap.get(city) || 0) + 1);
      });

      const cities = CITY_ORDER.map(city => [city, map.get(city) || 0, centerMap.get(city) || 0]);
      const activeCityCount = activities.filter(item => item.city).reduce((set, item) => set.add(item.city), new Set()).size;

      app.innerHTML = `
        <section class="hero">
          <div class="container">
            <div class="hero-card">
              <div>
                <h1 id="heroTitle">${escapeHtml(heroTitle)}</h1>
                <p id="heroText">${escapeHtml(heroText)}</p>
                ${heroLinkUrl ? `<a class="hero-link" id="heroLink" href="${escapeHtml(heroLinkUrl)}" target="_blank" rel="noopener noreferrer">${escapeHtml(heroLinkText || heroLinkUrl)}</a>` : ''}
                <div class="hero-actions">
                  <a class="btn btn-primary" href="#/centers">查看全台家照據點</a>
                </div>
              </div>
              <div class="hero-side">
                <div class="stat-card">
                  <div class="stat-label">目前活動總數</div>
                  <div class="stat-value">${activities.length}</div>
                </div>
                <div class="stat-card">
                  <div class="stat-label">目前有活動縣市</div>
                  <div class="stat-value">${activeCityCount}</div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="section">
          <div class="container">
            <div class="section-head">
              <div>
                <div class="section-subtitle">查看各縣市家照據點活動及家照據點列表</div>
              </div>
            </div>
            <div class="grid city-grid">${cities.map(([city, count, centerCount]) => buildCityCard(city, count, centerCount)).join('')}</div>
          </div>
        </section>
      `;
    }

    function renderCity(params) {
      setActiveNav('home');
      const cityName = params.get('name') || '';
      const allActivities = state.activities || [];
      const filtered = allActivities.filter(item => item.city === cityName).sort(sortActivities);

      app.innerHTML = `
        <section class="section">
          <div class="container">
            <button class="back-btn" onclick="history.back()">← 返回上頁</button>
            <div class="breadcrumbs">
              <a href="#/">首頁</a>
              <span>／</span>
              <span>${escapeHtml(cityName || '縣市活動')}</span>
            </div>
            <div class="section-head">
              <div>
                <div class="page-title">${escapeHtml(cityName || '縣市活動')}</div>
                <div class="page-desc">共 ${filtered.length} 場未過期活動</div>
              </div>
              <div class="card-actions">
                <a class="btn btn-secondary" href="#/">返回首頁</a>
                <a class="btn btn-primary" href="#/centers?city=${encodeURIComponent(cityName)}">家照據點列表</a>
              </div>
            </div>
            ${filtered.length ? `<div class="grid event-grid">${filtered.map(buildEventCard).join('')}</div>` : `<div class="empty">目前這個縣市沒有可顯示的活動。</div>`}
          </div>
        </section>
      `;
    }

    function renderActivity(params) {
      setActiveNav('home');
      const id = params.get('id') || '';
      const item = (state.activities || []).find(activity => activity.id === id);

      if (!item) {
        app.innerHTML = `<div class="container section"><div class="error-box">找不到這筆活動資料。</div></div>`;
        return;
      }

      const infoPanel = `
        <div class="panel-body">
          <h3 style="margin-bottom:16px; font-size:20px;">活動資訊</h3>
          <div class="detail-list">
            <div class="detail-item"><div class="label">日期</div><div class="value">${escapeHtml(item.date || '-')}</div></div>
            <div class="detail-item"><div class="label">時間</div><div class="value">${escapeHtml(item.time || '-')}</div></div>
            <div class="detail-item"><div class="label">地點</div><div class="value">${linkifyText(item.location || '-')}</div></div>
            <div class="detail-item"><div class="label">據點</div><div class="value">${escapeHtml(item.centerName || '-')}</div></div>
            <div class="detail-item"><div class="label">聯絡人</div><div class="value">${linkifyText(item.contactPerson || '-')}</div></div>
            <div class="detail-item"><div class="label">費用</div><div class="value">${escapeHtml(item.fee || '-')}</div></div>
            <div class="detail-item"><div class="label">報名方式</div><div class="value">${linkifyText(item.signupNote || '-')}</div></div>
          </div>
          <div class="card-actions" style="margin-top:18px;">
            <a class="btn btn-secondary" href="#/city?name=${encodeURIComponent(item.city)}">返回${escapeHtml(item.city)}</a>
            <a class="btn btn-primary" href="#/centers?city=${encodeURIComponent(item.city)}">家照據點列表</a>
          </div>
        </div>
      `;

      const descPanel = `
        <div style="padding:0;">
          <h3 style="margin-bottom:10px; font-size:20px;">活動介紹</h3>
          <div class="body-text">${linkifyText(item.description || '暫無活動介紹')}</div>
        </div>
      `;

      const metaHeading = `
        <div class="meta">
          <span class="chip primary">${escapeHtml(item.city || '未分類')}</span>
          <span class="chip">${escapeHtml(item.centerName || '據點')}</span>
        </div>
        <div class="detail-heading">
          <h2>${escapeHtml(item.title || '未命名活動')}</h2>
        </div>
      `;

      // Render landscape layout by default; switch to portrait after image loads
      app.innerHTML = `
        <section class="section">
          <div class="container">
            <button class="back-btn" onclick="history.back()">← 返回上頁</button>
            <div class="breadcrumbs">
              <a href="#/">首頁</a>
              <span>／</span>
              <a href="#/city?name=${encodeURIComponent(item.city)}">${escapeHtml(item.city)}</a>
              <span>／</span>
              <span>${escapeHtml(item.title)}</span>
            </div>
            <div id="activity-detail-layout"></div>
          </div>
        </section>
      `;

      const layoutEl = document.getElementById('activity-detail-layout');

      function renderLandscape() {
        layoutEl.innerHTML = `
          <div class="detail-layout">
            <article class="detail-main">
              <div class="detail-cover">${eventImageMarkup(item)}</div>
              <div class="detail-content">
                ${metaHeading}
                ${descPanel}
              </div>
            </article>
            <aside class="detail-side">${infoPanel}</aside>
          </div>
        `;
      }

      function renderPortrait() {
        // Image left, info+desc stacked right
        layoutEl.innerHTML = `
          <div style="display:grid; gap:22px; grid-template-columns: minmax(0, 0.55fr) minmax(280px, 0.45fr); align-items:start;">
            <article class="detail-main">
              <div class="detail-cover">${eventImageMarkup(item)}</div>
            </article>
            <aside style="display:grid; gap:18px; align-content:start;">
              <div class="detail-side">
                <div class="detail-content" style="padding-bottom:0;">
                  ${metaHeading}
                </div>
                ${infoPanel}
              </div>
              <div class="detail-main">
                <div class="detail-content">
                  ${descPanel}
                </div>
              </div>
            </aside>
          </div>
        `;
      }

      const imgUrl = normalizeDriveImage(item.image);
      if (imgUrl) {
        const probe = new Image();
        probe.onload = function() {
          if (probe.naturalHeight > probe.naturalWidth) {
            renderPortrait();
          } else {
            renderLandscape();
          }
        };
        probe.onerror = renderLandscape;
        probe.src = imgUrl;
        renderLandscape(); // show landscape immediately while probing
      } else {
        renderLandscape();
      }
    }

    function renderCenters(params) {
      setActiveNav('centers');
      const centers = state.centers || [];
      const selectedCityFromUrl = params?.get('city') || '';
      const cityOptions = Array.from(new Set(centers.map(item => item.city).filter(Boolean))).sort((a, b) => cityIndex(a) - cityIndex(b));

      app.innerHTML = `
        <section class="section">
          <div class="container">
            <button class="back-btn" onclick="history.back()">← 返回上頁</button>
            <div class="section-head">
              <div>
                <div class="page-title">${escapeHtml(selectedCityFromUrl || '全台家照據點')}</div>
                <div class="page-desc">可依縣市或關鍵字快速查找據點資訊。</div>
              </div>
            </div>

            <div class="toolbar">
              <input id="center-search" class="search" type="text" placeholder="搜尋據點名稱、地址、服務區域">
              <select id="center-city" class="select">
                <option value="">全部縣市</option>
                ${cityOptions.map(city => `<option value="${escapeHtml(city)}">${escapeHtml(city)}</option>`).join('')}
              </select>
            </div>

            <div id="center-list"></div>
          </div>
        </section>
      `;

      const listEl = document.getElementById('center-list');
      const searchEl = document.getElementById('center-search');
      const cityEl = document.getElementById('center-city');
      if (selectedCityFromUrl) cityEl.value = selectedCityFromUrl;

      function updateCenters() {
        const keyword = (searchEl.value || '').trim().toLowerCase();
        const city = cityEl.value;
        const filtered = centers.filter(item => {
          const matchCity = !city || item.city === city;
          const haystack = `${item.centerName || ''} ${item.address || ''} ${item.serviceArea || ''} ${item.phone || ''}`.toLowerCase();
          const matchKeyword = !keyword || haystack.includes(keyword);
          return matchCity && matchKeyword;
        });

        listEl.innerHTML = filtered.length
          ? `<div class="grid center-grid">${filtered.map(buildCenterCard).join('')}</div>`
          : `<div class="empty">查無符合條件的據點。</div>`;
      }

      searchEl.addEventListener('input', updateCenters);
      cityEl.addEventListener('change', updateCenters);
      updateCenters();
    }

    async function render() {
      app.innerHTML = `<div class="container section"><div class="loading">載入中…</div></div>`;
      await ensureData();

      if (state.error) {
        app.innerHTML = `<div class="container section"><div class="error-box">${escapeHtml(state.error)}</div></div>`;
        return;
      }

      const { path, params } = getHashInfo();
      if (path === '/' || path === '') return renderHome();
      if (path === '/city') return renderCity(params);
      if (path === '/activity') return renderActivity(params);
      if (path === '/centers') return renderCenters(params);

      app.innerHTML = `<div class="container section"><div class="error-box">找不到頁面。</div></div>`;
    }

    window.addEventListener('hashchange', render);
    render();
  </script>
</body>
</html>
